<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Internet Archive ランダムDL</title>
</head>
<body>

<button onclick="downloadRandom()">ランダムファイル取得</button>

<script>
async function downloadRandom() {
  try {
    // ランダムなオフセット（適当な範囲）
    const randomOffset = Math.floor(Math.random() * 10000);

    const url = `https://archive.org/advancedsearch.php?q=mediatype:(movies OR audio OR texts)&fl[]=identifier&rows=1&page=${randomOffset}&output=json`;

    const res = await fetch(url);
    const data = await res.json();

    const docs = data.response.docs;
    if (docs.length === 0) {
      alert("見つかりませんでした");
      return;
    }

    const id = docs[0].identifier;

    // ダウンロードURL（例：zip）
    const downloadUrl = `https://archive.org/download/${id}/${id}.zip`;

    const a = document.createElement("a");
    a.href = downloadUrl;
    a.download = "";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

  } catch (e) {
    console.error(e);
    alert("エラー発生");
  }
}
</script>

</body>
</html>
