<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Webhook送信</title>
</head>
<body>
  <button onclick="sendMessage()">送信</button>

  <script>
    function sendMessage() {
      const webhookURL = "https://discord.com/api/webhooks/1517462215337447514/97GElwMvhsrcTmkUcB-HlAaomYFkr464-x25V6iQOg5BZDUARSe2Ww4GzTAVxnyJmaZs";

      fetch(webhookURL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          content: "こんにちは！これはテストメッセージです"
        })
      })
      .then(res => alert("送信成功"))
      .catch(err => alert("エラー: " + err));
    }
  </script>
</body>
</html>
